<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rust + WASM Flip Book</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="container">
        <div data-include="partials/header.html"></div>
        <canvas id="display"></canvas>

        <!-- Customizable Tag -->
        <div class="title">フランス ゴッホの跳ね橋</div>
        <div class="description">
            ヴァン・ゴッホ橋<br>
            フランス アルル<br>
            Pont Van Gogh<br>
            Arles, France
            <ul>
            <li>表示画素：640×240、表示水平画角：140度</li>
            <li>撮影：大手明（東京都）Akira Ohte, Tokyo, Japan</li>
            <li>撮影地：Arles, FRANCE</li>
            <li>撮影年月：2006年9月</li>
            <li>球面ミラー全方位カメラ：試作品、ミラー径 6cm</li>
            <li>デジタルカメラ：Canon PowerShot G6, 7M pixels</li>
            </ul>
        </div>

        <div data-include="partials/controls.html"></div>
        <div id="helpText" hidden data-include="partials/help.html"></div>
        <div data-include="partials/footer.html"></div>
    </div>

<script>
window.addEventListener("keydown", (e) => {
    console.log("[DEBUG] keydown 捕捉:", e.key);
});

window.addEventListener("mousedown", (e) => {
    console.log("[DEBUG] mousedown: 捕捉", e.button);
});

window.addEventListener("touchstart", (e) => {
    console.log("[DEBUG] touchstart: 捕捉", e.touches.length);
});
</script>

    <script type="module" src="common.js"></script>
</body>
</html>
