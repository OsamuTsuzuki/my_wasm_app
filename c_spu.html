<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rust + WASM Flip Book</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="container">
        <div data-include="partials/header.html"></div>
        <canvas id="display"></canvas>

        <!-- Customizable Tag -->
        <div class="title">円筒面補正 / 正立像 / 画角180°</div>
        <div class="description">
            円筒面補正：円筒面状の仮想スクリーンの内側に射影<br>
            正立像：レンズを天頂に向けたとき天頂が上<br>
            画角：水平画角(画像の左端から右端までの角度)<br>
            スプリットループ/Split Loop View：前景と後景を上下向かい合わせに表示<br>
            光学系：魚眼レンズ(画角220°,等距離射映)
        </div>

        <div data-include="partials/controls.html"></div>
        <div id="helpText" hidden data-include="partials/help.html"></div>
        <div data-include="partials/footer.html"></div>
    </div>
    <script type="module" src="common.js"></script>
</body>
</html>
